        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        const MATCH_DURATION_MINS = 120; // estimated incl. halftime/stoppage

        function getMatchEnd(iso) {
            return new Date(new Date(iso).getTime() + MATCH_DURATION_MINS * 60000);
        }

        function getCountdown(iso) {
            const now = new Date();
            const start = new Date(iso);
            const end = getMatchEnd(iso);

            if (now < start) {
                const diff = start - now;
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                return `${hours}h ${mins}m to go`;
            }
            if (now < end) {
                const mins = Math.max(0, Math.floor((end - now) / 60000));
                return `рџ”ґ Live В· ~${mins}m left`;
            }
            return "Finished (FT)";
        }

        function renderSchedule() {
            const desktop = document.getElementById('desktop-schedule');
            const mobile = document.getElementById('mobile-schedule');
            const now = new Date();
            let scrollIndex = matches.findIndex(m => getMatchEnd(m.iso) > now);
            if (scrollIndex === -1) scrollIndex = matches.length - 1;
            let uniqueDates = [...new Set(matches.map(m => m.dateStr))];

            matches.forEach((match, index) => {
                let dateIndex = uniqueDates.indexOf(match.dateStr);
                const rowClass = (dateIndex % 2 === 0) ? 'bg-white dark:bg-slate-800' : 'bg-slate-200/70 dark:bg-slate-900/50';
                
                // Get the Day of the Week
                const dateObj = new Date(match.iso);
                const dayName = dateObj.toLocaleDateString('en-AU', { weekday: 'short' });

                let broadcastHtml = (match.broadcast === 'BBC') 
                    ? `<div class="inline-flex gap-[3px] shadow-sm"><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">C</span></div>`
                    : `<div class="flex items-center font-black text-2xl tracking-tighter"><span class="text-[#002b5c] dark:text-[#60a5fa]">I</span><span class="text-[#00a8e1] dark:text-[#22d3ee]">T</span><span class="text-[#0000a0] dark:text-[#818cf8]">V</span></div>`;

                const tr = document.createElement('tr');
                tr.className = `${rowClass} hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition-colors duration-200 cursor-default`;
                tr.id = `match-row-${index}`;
                tr.innerHTML = `
                    <td class="p-5 font-medium">${dayName}, ${match.datetime.split('-')[1].trim()}</td>
                    <td class="p-5 font-mono text-indigo-600 dark:text-indigo-400 countdown" data-time="${match.iso}">--</td>
                    <td class="p-5 font-bold">${match.fixture}</td>
                    <td class="p-5">${broadcastHtml}</td>
                `;
                desktop.appendChild(tr);

                const card = document.createElement('div');
                card.className = `${rowClass} p-5 rounded-xl border dark:border-slate-700`;
                card.id = `match-card-${index}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-slate-500 dark:text-slate-400">${dayName}, ${match.datetime}</span>
                        ${broadcastHtml}
                    </div>
                    <h3 class="font-bold text-lg">${match.fixture}</h3>
                    <span class="text-indigo-600 dark:text-indigo-400 font-mono text-sm countdown" data-time="${match.iso}">--</span>
                `;
                mobile.appendChild(card);

                if (index === scrollIndex) {
                    setTimeout(() => {
                        const el = document.getElementById(window.innerWidth < 768 ? `match-card-${index}` : `match-row-${index}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 300);
                }
            });
        }

        function updateCountdowns() {
            document.querySelectorAll('.countdown').forEach(el => el.innerText = getCountdown(el.dataset.time));
        }

        renderSchedule();
        updateCountdowns();
        setInterval(updateCountdowns, 60000);
