<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Next World Cup Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Theme Persistence Logic
        tailwind.config = { darkMode: 'class' }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans antialiased p-4 md:p-8 transition-colors duration-300">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 rounded-2xl bg-gradient-to-r from-indigo-900 to-blue-800 p-8 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Next World Cup Games</h1>
                <p class="text-indigo-200 mt-2 font-medium text-sm md:text-base">Spoiler-free schedule • Sydney Time (AEST)</p>
            </div>
            <button onclick="toggleTheme()" class="bg-indigo-700/50 hover:bg-indigo-600 text-white p-3 rounded-full transition-all">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <div class="hidden md:block bg-white dark:bg-slate-800 shadow-md rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 text-xs uppercase text-slate-500 dark:text-slate-400">
                        <th class="p-5">Time</th>
                        <th class="p-5">Countdown</th>
                        <th class="p-5">Fixture</th>
                        <th class="p-5 text-left">Broadcast</th>
                    </tr>
                </thead>
                <tbody id="desktop-schedule" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
            </table>
        </div>

        <div id="mobile-schedule" class="md:hidden space-y-4"></div>
    </div>

    <script>
        const matches = [
            { iso: "2026-06-21T03:00:00", dateStr: "21 June", fixture: "🇳🇱 Netherlands v Sweden 🇸🇪", broadcast: "BBC" },
            { iso: "2026-06-21T06:00:00", dateStr: "21 June", fixture: "🇩🇪 Germany v Ivory Coast 🇨🇮", broadcast: "ITV" },
            { iso: "2026-06-21T10:00:00", dateStr: "21 June", fixture: "🇨🇼 Curacao v Ecuador 🇪🇨", broadcast: "BBC" },
            { iso: "2026-06-21T14:00:00", dateStr: "21 June", fixture: "🇯🇵 Japan v Tunisia 🇹🇳", broadcast: "BBC" },
            { iso: "2026-06-22T02:00:00", dateStr: "22 June", fixture: "🇪🇸 Spain v Saudi Arabia 🇸🇦", broadcast: "BBC" },
            { iso: "2026-06-22T05:00:00", dateStr: "22 June", fixture: "🇧🇪 Belgium v Iran 🇮🇷", broadcast: "ITV" },
            { iso: "2026-06-22T08:00:00", dateStr: "22 June", fixture: "🇨🇻 Cape Verde v Uruguay 🇺🇾", broadcast: "BBC" },
            { iso: "2026-06-22T11:00:00", dateStr: "22 June", fixture: "🇪🇬 Egypt v New Zealand 🇳🇿", broadcast: "ITV" }
        ];

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function getCountdown(iso) {
            const now = new Date();
            const target = new Date(iso);
            const diff = target - now;
            if (diff <= 0) return "Started/Finished";
            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            return `${hours}h ${mins}m`;
        }

        function renderSchedule() {
            const desktop = document.getElementById('desktop-schedule');
            const mobile = document.getElementById('mobile-schedule');
            const targetDateStr = "21 June"; 
            let hasScrolled = false;

            matches.forEach((match, index) => {
                const isEven = index % 2 === 0;
                const rowClass = isEven ? 'bg-white dark:bg-slate-800' : 'bg-slate-50/80 dark:bg-slate-900/50';

                let broadcastHtml = (match.broadcast === 'BBC') 
                    ? `<div class="inline-flex gap-[3px] shadow-sm"><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">C</span></div>`
                    : `<div class="flex items-center font-black text-2xl tracking-tighter"><span class="text-[#002b5c] dark:text-[#60a5fa]">I</span><span class="text-[#00a8e1] dark:text-[#22d3ee]">T</span><span class="text-[#0000a0] dark:text-[#818cf8]">V</span></div>`;

                const tr = document.createElement('tr');
                tr.className = rowClass;
                tr.id = `match-row-${index}`;
                tr.innerHTML = `
                    <td class="p-5 font-medium">${new Date(match.iso).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
                    <td class="p-5 font-mono text-indigo-600 dark:text-indigo-400 countdown" data-time="${match.iso}">--</td>
                    <td class="p-5 font-bold">${match.fixture}</td>
                    <td class="p-5">${broadcastHtml}</td>
                `;
                desktop.appendChild(tr);

                const card = document.createElement('div');
                card.className = `${rowClass} p-5 rounded-xl border dark:border-slate-700`;
                card.id = `match-card-${index}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-slate-500">${match.dateStr}</span>
                        ${broadcastHtml}
                    </div>
                    <h3 class="font-bold text-lg mt-2">${match.fixture}</h3>
                    <span class="text-indigo-600 dark:text-indigo-400 font-mono countdown" data-time="${match.iso}">--</span>
                `;
                mobile.appendChild(card);

                if (match.dateStr === targetDateStr && !hasScrolled) {
                    setTimeout(() => {
                        const el = document.getElementById(window.innerWidth < 768 ? `match-card-${index}` : `match-row-${index}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 300);
                    hasScrolled = true;
                }
            });
        }

        function updateCountdowns() {
            document.querySelectorAll('.countdown').forEach(el => el.innerText = getCountdown(el.dataset.time));
        }

        renderSchedule();
        updateCountdowns();
        setInterval(updateCountdowns, 60000);
    </script>
</body>
</html>
