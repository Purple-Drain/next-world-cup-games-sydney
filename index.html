        let matches = FALLBACK_MATCHES;

        // matches.json is refreshed by .github/workflows/refresh-data.yml with
        // live kickoff times, venues and confirmed broadcasters.
        async function loadMatches() {
            try {
                const res = await fetch('matches.json', { cache: 'no-cache' });
                if (res.ok) {
                    const data = await res.json();
                    if (Array.isArray(data.matches) && data.matches.length) matches = data.matches;
                }
            } catch (e) {
                // offline or file:// вҖ” keep the built-in schedule
            }
        }

        function updateThemeIcon() {
            document.getElementById('theme-icon').textContent =
                document.documentElement.classList.contains('dark') ? 'рҹҢҷ' : 'вҳҖпёҸ';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            updateThemeIcon();
        }

        // Spoiler state вҖ” deliberately in-memory only, so every visit starts spoiler-safe.
        let showAllSpoilers = false;
        const revealedDays = new Set();

        function aestDateKey(date) {
            return date.toLocaleDateString('en-CA', { timeZone: 'Australia/Sydney' });
        }

        // Matches on today's AEST date or earlier aren't treated as spoilers;
        // only future days stay masked.
        function isPastOrToday(match) {
            return aestDateKey(parseAEST(match.iso)) <= aestDateKey(new Date());
        }

        // Team names stop being a spoiler once the games that decided them are
        // old news: revealAfter = latest feeder match's estimated end + 24h.
        function feedersAreOldNews(match) {
            return match.revealAfter && new Date() >= parseAEST(match.revealAfter);
        }

        function isMaskable(match) {
            return match.safeFixture && match.safeFixture !== match.fixture
                && !isPastOrToday(match) && !feedersAreOldNews(match);
        }

        function isRevealed(match) {
            return showAllSpoilers || revealedDays.has(match.dateStr);
        }

        function displayFixture(match) {
            return (isMaskable(match) && !isRevealed(match)) ? match.safeFixture : match.fixture;
        }

        function toggleSpoilers(checkbox) {
            showAllSpoilers = checkbox.checked;
            rerenderSchedule();
        }

        function toggleDay(dateStr) {
            if (revealedDays.has(dateStr)) revealedDays.delete(dateStr);
            else revealedDays.add(dateStr);
            rerenderSchedule();
        }

        function rerenderSchedule() {
            document.getElementById('desktop-schedule').innerHTML = '';
            document.getElementById('mobile-schedule').innerHTML = '';
            renderSchedule(false);
            updateCountdowns();
            if (typeof twemoji !== 'undefined') twemoji.parse(document.body);
        }

        const MATCH_DURATION_MINS = 120; // estimated incl. halftime/stoppage

        // iso strings have no offset, so anchor them to AEST (UTC+10, no DST
        // in June) instead of letting Date parse them in the viewer's local zone.
        function parseAEST(iso) {
            return new Date(`${iso}+10:00`);
        }

        function getMatchEnd(iso) {
            return new Date(parseAEST(iso).getTime() + MATCH_DURATION_MINS * 60000);
        }

        function formatAESTTime(date) {
            return date.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Australia/Sydney' });
        }

        const STATUS_COLORS = {
            upcoming: ['text-indigo-600', 'dark:text-indigo-400'],
            live: ['text-red-600', 'dark:text-red-400', 'font-semibold'],
            finished: ['text-slate-400', 'dark:text-slate-500']
        };
        const ALL_STATUS_COLOR_CLASSES = Object.values(STATUS_COLORS).flat();

        function getStatusInfo(iso) {
            const now = new Date();
            const start = parseAEST(iso);
            const end = getMatchEnd(iso);

            if (now < start) {
                const diff = start - now;
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                return { text: `${hours}h ${mins}m to go`, status: 'upcoming' };
            }
            if (now < end) {
                const mins = Math.max(0, Math.floor((end - now) / 60000));
                return { text: `рҹ”ҙ Live В· ~${mins}m left`, status: 'live' };
            }
            return { text: 'Finished', status: 'finished' };
        }

        function renderSchedule(scrollToNext = true) {
            const desktop = document.getElementById('desktop-schedule');
            const mobile = document.getElementById('mobile-schedule');
            const now = new Date();
            let scrollIndex = matches.findIndex(m => getMatchEnd(m.iso) > now);
            if (scrollIndex === -1) scrollIndex = matches.length - 1;
            let uniqueDates = [...new Set(matches.map(m => m.dateStr))];
            let prevStage = null;

            matches.forEach((match, index) => {
                let dateIndex = uniqueDates.indexOf(match.dateStr);
                const rowClass = (dateIndex % 2 === 0) ? 'bg-white dark:bg-slate-800' : 'bg-slate-200/70 dark:bg-slate-900/50';
                
                // Get the Day of the Week
                const dateObj = parseAEST(match.iso);
                const dayName = dateObj.toLocaleDateString('en-AU', { weekday: 'short', timeZone: 'Australia/Sydney' });
                const estEndStr = formatAESTTime(getMatchEnd(match.iso));

                const bbcHtml = `<div class="inline-flex gap-[3px] shadow-sm"><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">C</span></div>`;
                const itvHtml = `<div class="flex items-center font-black text-2xl tracking-tighter"><span class="text-[#002b5c] dark:text-[#60a5fa]">I</span><span class="text-[#00a8e1] dark:text-[#22d3ee]">T</span><span class="text-[#0000a0] dark:text-[#818cf8]">V</span></div>`;

                let broadcastHtml = match.broadcast === 'BOTH'
                    ? `<div class="flex items-center gap-2">${bbcHtml}${itvHtml}</div>`
                    : (match.broadcast === 'BBC' ? bbcHtml : itvHtml);

                if (!match.broadcastConfirmed) {
                    broadcastHtml = `
                        <div class="flex items-center gap-1.5" title="Estimated вҖ” exact broadcaster not yet confirmed">
                            <div class="opacity-60">${broadcastHtml}</div>
                            <span class="text-[10px] font-semibold uppercase tracking-wide text-amber-700 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/40 px-1.5 py-0.5 rounded">Est.</span>
                        </div>`;
                }

                if (match.stage !== prevStage) {
                    const stageRow = document.createElement('tr');
                    stageRow.innerHTML = `<td colspan="4" class="px-5 pt-6 pb-2 text-xs font-bold uppercase tracking-wider text-indigo-500 dark:text-indigo-400">${match.stage}</td>`;
                    desktop.appendChild(stageRow);

                    const stageHeading = document.createElement('div');
                    stageHeading.className = 'pt-4 pb-1 px-1 text-xs font-bold uppercase tracking-wider text-indigo-500 dark:text-indigo-400';
                    stageHeading.textContent = match.stage;
                    mobile.appendChild(stageHeading);

                    prevStage = match.stage;
                }

                const place = [match.venue, match.city].filter(Boolean).join(', ');
                const venueHtml = place
                    ? `<div class="text-xs font-normal text-slate-400 dark:text-slate-500 mt-1">рҹ“Қ ${place}</div>`
                    : '';

                let fixtureHtml = match.fixture;
                if (isMaskable(match) && !showAllSpoilers) {
                    const revealed = isRevealed(match);
                    let title = `${revealed ? 'Hide' : 'Reveal'} teams for all matches on ${match.dateStr}`;
                    if (!revealed && match.revealAfter) {
                        const at = parseAEST(match.revealAfter);
                        title += ` (auto-reveals ${at.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'long', timeZone: 'Australia/Sydney' })}, ${formatAESTTime(at)} AEST)`;
                    }
                    const eyeBtn = `<button onclick="toggleDay('${match.dateStr}')" title="${title}" class="ml-2 align-middle opacity-60 hover:opacity-100 transition-opacity">${revealed ? 'рҹҷҲ' : 'рҹ‘ҒпёҸ'}</button>`;
                    fixtureHtml = revealed
                        ? `${match.fixture}${eyeBtn}`
                        : `<span class="font-medium text-slate-500 dark:text-slate-400">${match.safeFixture}</span>${eyeBtn}`;
                }

                const tr = document.createElement('tr');
                tr.className = `${rowClass} hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition-colors duration-200 cursor-default`;
                tr.id = `match-row-${index}`;
                tr.innerHTML = `
                    <td class="p-5 font-medium">
                        ${dayName}, ${match.datetime.split('-')[1].trim()}
                        <div class="text-xs font-normal text-slate-400 dark:text-slate-500 mt-0.5">Est. end ~${estEndStr}</div>
                    </td>
                    <td class="p-5 font-mono countdown" data-time="${match.iso}">--</td>
                    <td class="p-5 font-bold">${fixtureHtml}${venueHtml}</td>
                    <td class="p-5">${broadcastHtml}</td>
                `;
                desktop.appendChild(tr);

                const card = document.createElement('div');
                card.className = `${rowClass} p-5 rounded-xl border dark:border-slate-700`;
                card.id = `match-card-${index}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div>
                            <span class="text-sm font-medium text-slate-500 dark:text-slate-400">${dayName}, ${match.datetime}</span>
                            <div class="text-xs text-slate-400 dark:text-slate-500">Est. end ~${estEndStr}</div>
                        </div>
                        ${broadcastHtml}
                    </div>
                    <h3 class="font-bold text-lg">${fixtureHtml}</h3>
                    ${venueHtml}
                    <span class="font-mono text-sm countdown" data-time="${match.iso}">--</span>
                `;
                mobile.appendChild(card);

                if (scrollToNext && index === scrollIndex) {
                    setTimeout(() => {
                        const el = document.getElementById(window.innerWidth < 768 ? `match-card-${index}` : `match-row-${index}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 300);
                }
            });
        }

        function updateCountdowns() {
            document.querySelectorAll('.countdown').forEach(el => {
                const { text, status } = getStatusInfo(el.dataset.time);
                el.innerText = text;
                el.classList.remove(...ALL_STATUS_COLOR_CLASSES);
                el.classList.add(...STATUS_COLORS[status]);
            });
        }

        updateThemeIcon();
        document.getElementById('spoiler-toggle').checked = false;
        loadMatches().finally(() => {
            renderSchedule();
            updateCountdowns();
            if (typeof twemoji !== 'undefined') twemoji.parse(document.body);
        });
        setInterval(updateCountdowns, 60000);
    </script>
</body>
</html>
