<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Next World Cup Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Theme Persistence Logic
        tailwind.config = { darkMode: 'class' }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans antialiased p-4 md:p-8 transition-colors duration-300">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 rounded-2xl bg-gradient-to-r from-indigo-900 to-blue-800 p-8 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Next World Cup Games</h1>
                <p class="text-indigo-200 mt-2 font-medium text-sm md:text-base">Spoiler-free schedule • Sydney Time (AEST)</p>
            </div>
            <button onclick="toggleTheme()" class="bg-indigo-700/50 hover:bg-indigo-600 text-white p-3 rounded-full transition-all">
                <span id="theme-icon">🌙</span>
            </button>
        </header>

        <div class="hidden md:block bg-white dark:bg-slate-800 shadow-md rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 text-xs uppercase text-slate-500 dark:text-slate-400">
                        <th class="p-5">Start Time</th>
                        <th class="p-5">Time to Start</th>
                        <th class="p-5">Fixture</th>
                        <th class="p-5 text-left">Broadcast</th>
                    </tr>
                </thead>
                <tbody id="desktop-schedule" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
            </table>
        </div>

        <div id="mobile-schedule" class="md:hidden space-y-4"></div>
    </div>

    <script>
        const matches = [
            { iso: "2026-06-21T03:00:00", dateStr: "21 June", datetime: "21 June - 03:00 AEST", fixture: "🇳🇱 Netherlands v Sweden 🇸🇪", broadcast: "BBC" },
            { iso: "2026-06-21T06:00:00", dateStr: "21 June", datetime: "21 June - 06:00 AEST", fixture: "🇩🇪 Germany v Ivory Coast 🇨🇮", broadcast: "ITV" },
            { iso: "2026-06-21T10:00:00", dateStr: "21 June", datetime: "21 June - 10:00 AEST", fixture: "🇨🇼 Curacao v Ecuador 🇪🇨", broadcast: "BBC" },
            { iso: "2026-06-21T14:00:00", dateStr: "21 June", datetime: "21 June - 14:00 AEST", fixture: "🇯🇵 Japan v Tunisia 🇹🇳", broadcast: "BBC" },
            { iso: "2026-06-22T02:00:00", dateStr: "22 June", datetime: "22 June - 02:00 AEST", fixture: "🇪🇸 Spain v Saudi Arabia 🇸🇦", broadcast: "BBC" },
            { iso: "2026-06-22T05:00:00", dateStr: "22 June", datetime: "22 June - 05:00 AEST", fixture: "🇧🇪 Belgium v Iran 🇮🇷", broadcast: "ITV" },
            { iso: "2026-06-22T08:00:00", dateStr: "22 June", datetime: "22 June - 08:00 AEST", fixture: "🇨🇻 Cape Verde v Uruguay 🇺🇾", broadcast: "BBC" },
            { iso: "2026-06-22T11:00:00", dateStr: "22 June", datetime: "22 June - 11:00 AEST", fixture: "🇪🇬 Egypt v New Zealand 🇳🇿", broadcast: "ITV" },
            { iso: "2026-06-23T03:00:00", dateStr: "23 June", datetime: "23 June - 03:00 AEST", fixture: "🇦🇷 Argentina v Austria 🇦🇹", broadcast: "BBC" },
            { iso: "2026-06-23T07:00:00", dateStr: "23 June", datetime: "23 June - 07:00 AEST", fixture: "🇫🇷 France v Iraq 🇮🇶", broadcast: "BBC" },
            { iso: "2026-06-23T10:00:00", dateStr: "23 June", datetime: "23 June - 10:00 AEST", fixture: "🇸🇳 Senegal v Norway 🇳🇴", broadcast: "ITV" },
            { iso: "2026-06-23T13:00:00", dateStr: "23 June", datetime: "23 June - 13:00 AEST", fixture: "🇩🇿 Algeria v Jordan 🇯🇴", broadcast: "ITV" },
            { iso: "2026-06-24T03:00:00", dateStr: "24 June", datetime: "24 June - 03:00 AEST", fixture: "🇵🇹 Portugal v Uzbekistan 🇺🇿", broadcast: "ITV" },
            { iso: "2026-06-24T06:00:00", dateStr: "24 June", datetime: "24 June - 06:00 AEST", fixture: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 England v Ghana 🇬🇭", broadcast: "BBC" },
            { iso: "2026-06-24T09:00:00", dateStr: "24 June", datetime: "24 June - 09:00 AEST", fixture: "🇭🇷 Croatia v Panama 🇵🇦", broadcast: "BBC" },
            { iso: "2026-06-24T12:00:00", dateStr: "24 June", datetime: "24 June - 12:00 AEST", fixture: "🇨🇴 Colombia v DR Congo 🇨🇩", broadcast: "ITV" },
            { iso: "2026-06-25T05:00:00", dateStr: "25 June", datetime: "25 June - 05:00 AEST", fixture: "🇨🇦 Canada v Switzerland 🇨🇭", broadcast: "ITV" },
            { iso: "2026-06-25T05:00:00", dateStr: "25 June", datetime: "25 June - 05:00 AEST", fixture: "🇧🇦 Bosnia-Herzegovina v Qatar 🇶🇦", broadcast: "ITV" },
            { iso: "2026-06-25T08:00:00", dateStr: "25 June", datetime: "25 June - 08:00 AEST", fixture: "🏴󠁧󠁢󠁳󠁣󠁴󠁿 Scotland v Brazil 🇧🇷", broadcast: "BBC" },
            { iso: "2026-06-25T08:00:00", dateStr: "25 June", datetime: "25 June - 08:00 AEST", fixture: "🇲🇦 Morocco v Haiti 🇭🇹", broadcast: "BBC" },
            { iso: "2026-06-25T11:00:00", dateStr: "25 June", datetime: "25 June - 11:00 AEST", fixture: "🇨🇿 Czech Republic v Mexico 🇲🇽", broadcast: "BBC" },
            { iso: "2026-06-25T11:00:00", dateStr: "25 June", datetime: "25 June - 11:00 AEST", fixture: "🇿🇦 South Africa v South Korea 🇰🇷", broadcast: "BBC" },
            { iso: "2026-06-26T06:00:00", dateStr: "26 June", datetime: "26 June - 06:00 AEST", fixture: "🇪🇨 Ecuador v Germany 🇩🇪", broadcast: "BBC" },
            { iso: "2026-06-26T06:00:00", dateStr: "26 June", datetime: "26 June - 06:00 AEST", fixture: "🇨🇼 Curacao v Ivory Coast 🇨🇮", broadcast: "BBC" },
            { iso: "2026-06-26T09:00:00", dateStr: "26 June", datetime: "26 June - 09:00 AEST", fixture: "🇯🇵 Japan v Sweden 🇸🇪", broadcast: "BBC" },
            { iso: "2026-06-26T09:00:00", dateStr: "26 June", datetime: "26 June - 09:00 AEST", fixture: "🇹🇳 Tunisia v Netherlands 🇳🇱", broadcast: "BBC" },
            { iso: "2026-06-26T12:00:00", dateStr: "26 June", datetime: "26 June - 12:00 AEST", fixture: "🇹🇷 Turkey v USA 🇺🇸", broadcast: "ITV" },
            { iso: "2026-06-26T12:00:00", dateStr: "26 June", datetime: "26 June - 12:00 AEST", fixture: "🇵🇾 Paraguay v Australia 🇦🇺", broadcast: "ITV" },
            { iso: "2026-06-27T05:00:00", dateStr: "27 June", datetime: "27 June - 05:00 AEST", fixture: "🇳🇴 Norway v France 🇫🇷", broadcast: "ITV" },
            { iso: "2026-06-27T05:00:00", dateStr: "27 June", datetime: "27 June - 05:00 AEST", fixture: "🇸🇳 Senegal v Iraq 🇮🇶", broadcast: "ITV" },
            { iso: "2026-06-27T10:00:00", dateStr: "27 June", datetime: "27 June - 10:00 AEST", fixture: "🇨🇻 Cape Verde v Saudi Arabia 🇸🇦", broadcast: "ITV" },
            { iso: "2026-06-27T10:00:00", dateStr: "27 June", datetime: "27 June - 10:00 AEST", fixture: "🇺🇾 Uruguay v Spain 🇪🇸", broadcast: "ITV" },
            { iso: "2026-06-27T13:00:00", dateStr: "27 June", datetime: "27 June - 13:00 AEST", fixture: "🇪🇬 Egypt v Iran 🇮🇷", broadcast: "BBC" },
            { iso: "2026-06-27T13:00:00", dateStr: "27 June", datetime: "27 June - 13:00 AEST", fixture: "🇳🇿 New Zealand v Belgium 🇧🇪", broadcast: "BBC" },
            { iso: "2026-06-28T07:00:00", dateStr: "28 June", datetime: "28 June - 07:00 AEST", fixture: "🇵🇦 Panama v England 🏴󠁧󠁢󠁥󠁮󠁧󠁿", broadcast: "ITV" },
            { iso: "2026-06-28T07:00:00", dateStr: "28 June", datetime: "28 June - 07:00 AEST", fixture: "🇭🇷 Croatia v Ghana 🇬🇭", broadcast: "ITV" },
            { iso: "2026-06-28T09:30:00", dateStr: "28 June", datetime: "28 June - 09:30 AEST", fixture: "🇨🇴 Colombia v Portugal 🇵🇹", broadcast: "BBC" },
            { iso: "2026-06-28T09:30:00", dateStr: "28 June", datetime: "28 June - 09:30 AEST", fixture: "🇨🇩 DR Congo v Uzbekistan 🇺🇿", broadcast: "BBC" },
            { iso: "2026-06-28T12:00:00", dateStr: "28 June", datetime: "28 June - 12:00 AEST", fixture: "🇩🇿 Algeria v Austria 🇦🇹", broadcast: "BBC" },
            { iso: "2026-06-28T12:00:00", dateStr: "28 June", datetime: "28 June - 12:00 AEST", fixture: "🇯🇴 Jordan v Argentina 🇦🇷", broadcast: "BBC" }
        ];

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function getCountdown(iso) {
            const now = new Date();
            const target = new Date(iso);
            const diff = target - now;
            if (diff <= 0) return "Started/Finished";
            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            return `${hours}h ${mins}m to go`;
        }

        function renderSchedule() {
            const desktop = document.getElementById('desktop-schedule');
            const mobile = document.getElementById('mobile-schedule');
            const targetDateStr = "21 June"; 
            let hasScrolled = false;
            let uniqueDates = [...new Set(matches.map(m => m.dateStr))];

            matches.forEach((match, index) => {
                let dateIndex = uniqueDates.indexOf(match.dateStr);
                const rowClass = (dateIndex % 2 === 0) ? 'bg-white dark:bg-slate-800' : 'bg-slate-50/80 dark:bg-slate-900/50';

                let broadcastHtml = (match.broadcast === 'BBC') 
                    ? `<div class="inline-flex gap-[3px] shadow-sm"><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">B</span><span class="bg-black text-white font-bold text-lg px-2 py-1">C</span></div>`
                    : `<div class="flex items-center font-black text-2xl tracking-tighter"><span class="text-[#002b5c] dark:text-[#60a5fa]">I</span><span class="text-[#00a8e1] dark:text-[#22d3ee]">T</span><span class="text-[#0000a0] dark:text-[#818cf8]">V</span></div>`;

                const tr = document.createElement('tr');
                tr.className = `${rowClass} hover:bg-indigo-50/30 dark:hover:bg-indigo-900/20 transition-colors duration-200 cursor-default`;
                tr.id = `match-row-${index}`;
                tr.innerHTML = `
                    <td class="p-5 font-medium text-slate-700 dark:text-slate-300">${match.datetime.split('-')[1].trim()}</td>
                    <td class="p-5 font-mono text-indigo-600 dark:text-indigo-400 countdown" data-time="${match.iso}">--</td>
                    <td class="p-5 font-bold">${match.fixture}</td>
                    <td class="p-5">${broadcastHtml}</td>
                `;
                desktop.appendChild(tr);

                const card = document.createElement('div');
                card.className = `${rowClass} p-5 rounded-xl border dark:border-slate-700`;
                card.id = `match-card-${index}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-slate-500 dark:text-slate-400">${match.datetime}</span>
                        ${broadcastHtml}
                    </div>
                    <h3 class="font-bold text-lg">${match.fixture}</h3>
                    <span class="text-indigo-600 dark:text-indigo-400 font-mono text-sm countdown" data-time="${match.iso}">--</span>
                `;
                mobile.appendChild(card);

                if (match.dateStr === targetDateStr && !hasScrolled) {
                    setTimeout(() => {
                        const el = document.getElementById(window.innerWidth < 768 ? `match-card-${index}` : `match-row-${index}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 300);
                    hasScrolled = true;
                }
            });
        }

        function updateCountdowns() {
            document.querySelectorAll('.countdown').forEach(el => el.innerText = getCountdown(el.dataset.time));
        }

        renderSchedule();
        updateCountdowns();
        setInterval(updateCountdowns, 60000);
    </script>
</body>
</html>
