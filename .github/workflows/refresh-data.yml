name: Refresh match data

on:
  schedule:
    - cron: '23 */6 * * *' # every 6 hours during the tournament
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh matches.json from live feed
        run: node scripts/refresh-data.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet matches.json; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git commit -m "Refresh match data (times, venues, broadcasters)"
          git push
